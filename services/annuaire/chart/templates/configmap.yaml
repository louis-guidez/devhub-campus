apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "annuaire.fullname" . }}-config
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    {{- include "annuaire.labels" . | nindent 4 }}
    {{- if .Values.configMap.failValidation }}
    invalid-label: 123
    {{- end }}
data:
  LOG_LEVEL: {{ .Values.env.LOG_LEVEL | quote }}
