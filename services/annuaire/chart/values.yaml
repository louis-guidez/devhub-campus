# Values par défaut du chart annuaire.
# Surchargées par values-dev.yaml et values-preview.yaml selon l'environnement.

image:
  repository: ghcr.io/louis-guidez/annuaire
  tag: "tag-inexistant"
  pullPolicy: IfNotPresent

replicaCount: 2
environment: dev
progressDeadlineSeconds: 60

namespace:
  createResource: false

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: nginx
  host: annuaire.devhub.local
  path: /

env:
  LOG_LEVEL: info

# TODO étape 4 (défi) : ajoutez ici un bloc `pdb` pour le PodDisruptionBudget.
# pdb:
#   enabled: false
#   minAvailable: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

securityContext:
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop: ["ALL"]

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

probes:
  readiness:
    path: /healthz
    initialDelaySeconds: 2
    periodSeconds: 5
  liveness:
    path: /healthz
    initialDelaySeconds: 10
    periodSeconds: 10
