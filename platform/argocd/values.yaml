# Values Helm pour installer ArgoCD lui-même (chart argo/argo-cd).
# Ce fichier est consommé par `make argocd-install`.
#
# Doc du chart : https://github.com/argoproj/argo-helm/tree/main/charts/argo-cd
#
# Le but de ce fichier : exposer l'UI via l'ingress-nginx du cluster,
# avec un host `argocd.devhub.local`. Le reste est laissé par défaut.

global:
  domain: argocd.devhub.local

configs:
  params:
    # désactive le TLS interne — l'ingress-nginx est devant pour le HTTPS.
    server.insecure: true
  cm:
    timeout.reconciliation: 180s
    accounts.developer: login, apiKey
    accounts.platform-admin: login, apiKey

  rbac:
    policy.default: ""
    policy.matchMode: glob
    policy.csv: |
      p, role:developer, applications, get, devhub/*, allow
      p, role:developer, applications, sync, devhub/*annuaire*, allow
      p, role:developer, projects, get, devhub, allow
      g, developer, role:developer

      p, role:platform-admin, *, *, *, allow
      g, platform-admin, role:platform-admin

server:
  ingress:
    enabled: true
    ingressClassName: nginx
    hostname: argocd.devhub.local
    annotations:
      # ArgoCD termine son propre TLS en interne. On dit à l'ingress
      # de ne pas refaire de TLS terminaison côté server.
      nginx.ingress.kubernetes.io/backend-protocol: HTTP
    tls: false
  metrics:
    enabled: true

notifications:
  enabled: true
  metrics:
    enabled: true
  notifiers:
    service.webhook.webhook-site: |
      url: $webhook-url
      headers:
        - name: Content-Type
          value: application/json
  templates:
    template.app-sync-failed-webhook: |
      webhook:
        webhook-site:
          method: POST
          body: |
            {
              "application": {{ toJson .app.metadata.name }},
              "revision": {{ toJson .app.status.sync.revision }},
              "error": {{ toJson .app.status.operationState.message }}
            }
  triggers:
    trigger.on-sync-failed: |
      - description: Application synchronization has failed
        send:
          - app-sync-failed-webhook
        when: app.status.operationState != nil && app.status.operationState.phase in ['Error', 'Failed']
  subscriptions:
    - recipients:
        - webhook-site
      triggers:
        - on-sync-failed

# Garde-fou ressources — utile en TP pour ne pas saturer la machine.
controller:
  metrics:
    enabled: true
  resources:
    requests: { cpu: "50m", memory: "256Mi" }
    limits:   { cpu: "1",   memory: "1Gi" }

repoServer:
  metrics:
    enabled: true
  resources:
    requests: { cpu: "50m", memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }
