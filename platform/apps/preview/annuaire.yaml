apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: annuaire-preview
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - pullRequest:
        github:
          owner: louis-guidez
          repo: devhub-campus
          tokenRef:
            secretName: github-token
            key: token
        filters:
          - branchMatch: "^feature/.*"
        requeueAfterSeconds: 60
  template:
    metadata:
      name: 'annuaire-preview-{{.branch_slug}}'
      finalizers:
        - resources-finalizer.argocd.argoproj.io
      labels:
        devhub.io/env: preview
        devhub.io/service: annuaire
    spec:
      project: devhub
      source:
        repoURL: https://github.com/louis-guidez/devhub-campus.git
        targetRevision: '{{.head_sha}}'
        path: services/annuaire/chart
        helm:
          valueFiles:
            - values-preview.yaml
          parameters:
            - name: environment
              value: preview
            - name: namespace.createResource
              value: "true"
            - name: image.tag
              value: '{{.head_sha}}'
            - name: ingress.host
              value: 'annuaire-{{.branch_slug}}.devhub.local'
      destination:
        server: https://kubernetes.default.svc
        namespace: 'devhub-preview-{{.branch_slug}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
