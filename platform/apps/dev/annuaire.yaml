# Application ArgoCD : annuaire-dev
#
# Déploie le chart Helm de services/annuaire/chart dans le namespace devhub-dev.
# Étape 5 (création manuelle) puis étape 6 (générée par la root).

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: annuaire-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # La première Application utilise le projet intégré. Elle sera déplacée
  # dans l'AppProject `devhub` à l'étape 6.
  project: default

  source:
    # TODO : URL de votre fork.
    repoURL: https://github.com/louis-guidez/devhub-campus.git
    targetRevision: main
    # TODO : chemin vers le chart Helm du service.
    path: services/annuaire/chart
    helm:
      # TODO : pointez vers le bon fichier de values.
      # Indice : il y en a un par environnement.
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: devhub-dev

  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
