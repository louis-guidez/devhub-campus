# Root Application (pattern App of Apps).
#
# C'est la SEULE Application que vous créez à la main avec `kubectl apply`.
# Tout le reste sera créé par elle, à partir des fichiers de `platform/apps/dev/`.
#
# Référence : https://argo-cd.readthedocs.io/en/stable/operator-manual/cluster-bootstrapping/
#
# Étape 6 — à compléter.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  # le finalizer assure que `kubectl delete app root` propage la suppression
  # à toutes les Apps enfants (utile pour reset).
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # La root doit pouvoir créer l'AppProject devhub ; elle utilise donc le
  # projet intégré uniquement pour le bootstrap de la plateforme.
  project: default

  sources:
    # L'AppProject est synchronisé en wave -1, avant les Applications.
    - repoURL: https://github.com/louis-guidez/devhub-campus.git
      targetRevision: main
      path: platform/projects
      directory:
        recurse: true
    - repoURL: https://github.com/louis-guidez/devhub-campus.git
      targetRevision: main
      path: platform/apps/dev
      directory:
        recurse: true
    - repoURL: https://github.com/louis-guidez/devhub-campus.git
      targetRevision: main
      path: platform/apps/preview
      directory:
        recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
